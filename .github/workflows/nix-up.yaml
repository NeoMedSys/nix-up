name: Nix Up CI/CD
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  release:
    types: [published]
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/determinate-nix-action@v3
      - run: |
      - run: |
          cat > user-config.nix << 'EOF'
          {
            username = "ci-user";
            hostname = "nixip";
            isLaptop = false;
            hasGPU = false;
            thunderbolt = false;
            timezone = "Europe/Amsterdam";
            latitude = 52.4;
            longitude = 4.9;
            browsers = ["librewolf" "firefox"];
            devTools = ["python" "go"];
            flatpakApps = ["com.slack.Slack" "com.spotify.Client"];
            email = true;
            vpn = false;
            gitName = "CI User";
            gitEmail = "ci@example.com";
            wallpaperPath = "assets/wallpaper.png";
            avatarPath = "assets/king.png";
          }
          EOF
      - run: nix flake update oisd
      - run: nix flake check
      - run: nix flake show
      - run: echo "=== user-config.nix content ===" && cat user-config.nix
      - run: nix run nixpkgs#statix -- check .
      - run: nix run nixpkgs#deadnix -- .
      - run: nix eval .#nixosConfigurations.nixup.config.system.build.toplevel
  publish:
    if: github.event_name == 'release'
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v9
      - uses: DeterminateSystems/flakehub-push@main
        with:
          name: NeoMedSys/nixup
          tag: ${{ github.event.release.tag_name }}
          visibility: public
